  <!-- MAIN -->
  <main class="main-content">
    <div class="page-header">
      <h2>Customers</h2>
      <input type="text" class="chat-search" placeholder="Search name or phone..." id="customerSearch" style="max-width:300px">
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>City</th>
            <th>Orders</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="customersBody">
          <tr><td colspan="6" style="text-align:center;padding:40px;color:#667781;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="table-footer" id="customerCount">Total: 0 customers</div>
  </main>

  <script src="/admin/app.js"></script>
  <script>
    // Customer search
    const custSearch = document.getElementById('customerSearch');
    if (custSearch) {
      custSearch.addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        document.querySelectorAll('#customersBody tr').forEach(row => {
          const text = row.textContent.toLowerCase();
          row.style.display = text.includes(q) ? '' : 'none';
        });
      });
    }
  </script>
