<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complaints — WhatsApp Agent</title>
  <link rel="stylesheet" href="/admin/style.css">
  <style>
    .comp-stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
    .comp-stat { background: #fff; border-radius: 10px; padding: 14px; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.08); min-width: 0; }
    .comp-stat .num { font-size: 22px; font-weight: 700; }
    .comp-stat .label { font-size: 11px; color: #999; text-transform: uppercase; }
    .comp-stat.active .num { color: #DC2626; }
    .comp-stat.closed .num { color: #16A34A; }
    .comp-stat.unsolveable .num { color: #9333EA; }
    .comp-stat.refund .num { color: #D97706; }
    .comp-stat.exchange .num { color: #2563EB; }

    .comp-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .comp-filter { padding: 6px 14px; border-radius: 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 13px; color: #555; }
    .comp-filter.active { background: #075E54; color: #fff; border-color: #075E54; }

    .comp-card { background: #fff; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; border-left: 4px solid #DC2626; }
    .comp-card.status-closed { border-left-color: #16A34A; }
    .comp-card.status-unsolveable { border-left-color: #9333EA; }
    .comp-card.status-refund { border-left-color: #D97706; }
    .comp-card.status-exchange { border-left-color: #2563EB; }

    .comp-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; cursor: pointer; gap: 8px; flex-wrap: wrap; }
    .comp-header:hover { background: #f7f7f7; }
    .comp-name { font-weight: 700; font-size: 14px; color: #1a1a1a; min-width: 100px; }
    .comp-phone { font-size: 13px; color: #555; }
    .comp-product { font-size: 13px; color: #333; flex: 1; min-width: 80px; }
    .comp-time { font-size: 11px; color: #999; white-space: nowrap; }
    .comp-response { font-size: 11px; padding: 3px 8px; border-radius: 8px; white-space: nowrap; }
    .comp-response.sent { background: #DCFCE7; color: #16A34A; }
    .comp-response.pending { background: #FEF3C7; color: #D97706; }
    .comp-response.human { background: #DBEAFE; color: #2563EB; }
    .comp-badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-active { background: #FEE2E2; color: #DC2626; }
    .badge-closed { background: #DCFCE7; color: #16A34A; }
    .badge-unsolveable { background: #F3E8FF; color: #9333EA; }
    .badge-refund { background: #FEF3C7; color: #D97706; }
    .badge-exchange { background: #DBEAFE; color: #2563EB; }

    .comp-body { display: none; padding: 0 16px 16px; border-top: 1px solid #f0f0f0; }
    .comp-body.open { display: block; }

    .comp-desc { background: #f8f9fa; border-radius: 8px; padding: 10px 12px; margin-top: 10px; font-size: 13px; color: #333; line-height: 1.5; }
    .comp-desc h4 { font-size: 11px; color: #999; text-transform: uppercase; margin: 0 0 4px; }

    .comp-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
    .status-select { padding: 6px 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; }

    .remarks-section { margin-top: 14px; }
    .remarks-section h4 { font-size: 12px; color: #666; margin: 0 0 8px; }
    .remark-item { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; }
    .remark-time { color: #999; font-size: 11px; white-space: nowrap; min-width: 110px; }
    .remark-text { color: #333; }
    .remark-input { display: flex; gap: 8px; margin-top: 8px; }
    .remark-input input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }
    .remark-input button { padding: 8px 16px; background: #075E54; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; white-space: nowrap; }
    .remark-input button:hover { background: #054d44; }

    .no-complaints { text-align: center; padding: 60px 20px; color: #999; }

    @media (max-width: 768px) {
      .comp-stats { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 480px) {
      .comp-stats { grid-template-columns: repeat(2, 1fr); }
      .comp-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>

  <!-- MAIN -->
  <main class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:8px;">
      <h2 style="margin:0; font-size:20px;">Complaints Tracker</h2>
      <button onclick="backfillComplaints(this)" style="padding:6px 14px; background:#075E54; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:12px;">Sync Old Complaints</button>
    </div>

    <!-- Stats -->
    <div class="comp-stats" id="compStats">
      <div class="comp-stat"><div class="num" id="statTotal">-</div><div class="label">Total</div></div>
      <div class="comp-stat active"><div class="num" id="statActive">-</div><div class="label">Active</div></div>
      <div class="comp-stat closed"><div class="num" id="statClosed">-</div><div class="label">Closed</div></div>
      <div class="comp-stat unsolveable"><div class="num" id="statUnsolveable">-</div><div class="label">Unsolveable</div></div>
      <div class="comp-stat refund"><div class="num" id="statRefund">-</div><div class="label">Refund</div></div>
      <div class="comp-stat exchange"><div class="num" id="statExchange">-</div><div class="label">Exchange</div></div>
    </div>

    <!-- Filters -->
    <div class="comp-filters">
      <button class="comp-filter active" onclick="filterComplaints('all', this)">All</button>
      <button class="comp-filter" onclick="filterComplaints('active', this)">Active</button>
      <button class="comp-filter" onclick="filterComplaints('closed', this)">Closed</button>
      <button class="comp-filter" onclick="filterComplaints('unsolveable', this)">Unsolveable</button>
      <button class="comp-filter" onclick="filterComplaints('refund', this)">Refund</button>
      <button class="comp-filter" onclick="filterComplaints('exchange', this)">Exchange</button>
    </div>

    <!-- List -->
    <div id="complaintsList"></div>
    <div id="noComplaints" class="no-complaints" style="display:none;">Koi complaint nahi hai abhi!</div>
  </main>

  <script src="/admin/app.js"></script>
  <script>
    let allComplaints = [];
    let currentFilter = 'all';

    async function loadComplaints() {
      try {
        const data = await api('/api/complaints');
        allComplaints = data.complaints || [];

        // Stats
        const s = data.stats || {};
        document.getElementById('statTotal').textContent = s.total || 0;
        document.getElementById('statActive').textContent = s.active || 0;
        document.getElementById('statClosed').textContent = s.closed || 0;
        document.getElementById('statUnsolveable').textContent = s.unsolveable || 0;
        document.getElementById('statRefund').textContent = s.refund || 0;
        document.getElementById('statExchange').textContent = s.exchange || 0;

        renderComplaints();
      } catch (e) {
        console.error('Load complaints error:', e);
      }
    }

    function filterComplaints(status, btn) {
      currentFilter = status;
      document.querySelectorAll('.comp-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderComplaints();
    }

    function renderComplaints() {
      const list = document.getElementById('complaintsList');
      const noEl = document.getElementById('noComplaints');
      const filtered = currentFilter === 'all' ? allComplaints : allComplaints.filter(c => c.status === currentFilter);

      if (filtered.length === 0) {
        list.innerHTML = '';
        noEl.style.display = 'block';
        return;
      }
      noEl.style.display = 'none';

      list.innerHTML = filtered.map(c => `
        <div class="comp-card status-${c.status}" id="comp-${c.id}">
          <div class="comp-header" onclick="toggleComp(${c.id})">
            <span class="comp-name">${esc(c.customer_name || 'Unknown')}</span>
            <span class="comp-phone">${esc(c.customer_phone || '-')}</span>
            <span class="comp-product">${esc(c.product_name || '-')}</span>
            ${c.bot_replies_after > 0 ? '<span class="comp-response sent">Msg Sent</span>' : '<span class="comp-response pending">Msg Pending</span>'}
            <span class="comp-badge badge-${c.status}">${c.status.toUpperCase()}</span>
            <span class="comp-time">${formatTime(c.created_at)}</span>
          </div>
          <div class="comp-body" id="comp-body-${c.id}">
            ${c.description ? `<div class="comp-desc"><h4>Customer Message</h4>${esc(c.description)}</div>` : ''}

            <div class="comp-actions">
              <select class="status-select" id="status-${c.id}" onchange="updateStatus(${c.id}, this.value)">
                <option value="active" ${c.status === 'active' ? 'selected' : ''}>Active</option>
                <option value="closed" ${c.status === 'closed' ? 'selected' : ''}>Closed</option>
                <option value="unsolveable" ${c.status === 'unsolveable' ? 'selected' : ''}>Unsolveable</option>
                <option value="refund" ${c.status === 'refund' ? 'selected' : ''}>Refund</option>
                <option value="exchange" ${c.status === 'exchange' ? 'selected' : ''}>Exchange</option>
              </select>
              ${c.last_remark ? `<span style="font-size:11px; color:#999;">Last remark: ${formatTime(c.last_remark_at)}</span>` : ''}
            </div>

            <div class="remarks-section">
              <h4>Remarks (${c.remark_count || 0})</h4>
              <div id="remarks-${c.id}"><span style="font-size:12px; color:#999;">Click to load remarks...</span></div>
              <div class="remark-input">
                <input type="text" id="remark-input-${c.id}" placeholder="Add remark..." onkeydown="if(event.key==='Enter')addRemark(${c.id})">
                <button onclick="addRemark(${c.id})">Add</button>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    async function toggleComp(id) {
      const body = document.getElementById('comp-body-' + id);
      const isOpen = body.classList.contains('open');
      // Close all
      document.querySelectorAll('.comp-body.open').forEach(el => el.classList.remove('open'));
      if (!isOpen) {
        body.classList.add('open');
        loadRemarks(id);
      }
    }

    async function loadRemarks(id) {
      try {
        const data = await api('/api/complaints/' + id + '/remarks');
        const container = document.getElementById('remarks-' + id);
        const remarks = data.remarks || [];
        if (remarks.length === 0) {
          container.innerHTML = '<span style="font-size:12px; color:#999;">No remarks yet</span>';
          return;
        }
        container.innerHTML = remarks.map(r => `
          <div class="remark-item">
            <span class="remark-time">${formatTime(r.created_at)}</span>
            <span class="remark-text">${esc(r.remark)}</span>
          </div>
        `).join('');
      } catch (e) {
        console.error('Load remarks error:', e);
      }
    }

    async function updateStatus(id, status) {
      try {
        await api('/api/complaints/' + id + '/status', {
          method: 'PATCH',
          body: JSON.stringify({ status })
        });
        // Update local data
        const comp = allComplaints.find(c => c.id === id);
        if (comp) comp.status = status;
        renderComplaints();
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    async function addRemark(id) {
      const input = document.getElementById('remark-input-' + id);
      const text = input.value.trim();
      if (!text) return;
      try {
        await api('/api/complaints/' + id + '/remarks', {
          method: 'POST',
          body: JSON.stringify({ remark: text })
        });
        input.value = '';
        // Update count
        const comp = allComplaints.find(c => c.id === id);
        if (comp) comp.remark_count = (comp.remark_count || 0) + 1;
        loadRemarks(id);
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function formatTime(ts) {
      if (!ts) return '-';
      const d = new Date(ts);
      if (isNaN(d)) return ts;
      const now = new Date();
      const isToday = d.toDateString() === now.toDateString();
      const time = d.toLocaleTimeString('en-PK', { hour: '2-digit', minute: '2-digit', hour12: true });
      if (isToday) return time;
      return d.toLocaleDateString('en-PK', { day: '2-digit', month: 'short' }) + ' ' + time;
    }

    async function backfillComplaints(btn) {
      btn.disabled = true;
      btn.textContent = 'Syncing...';
      try {
        const data = await api('/api/complaints/backfill', { method: 'POST' });
        btn.textContent = `Done! +${data.added || 0} added`;
        if (data.added > 0) loadComplaints();
        setTimeout(() => { btn.textContent = 'Sync Old Complaints'; btn.disabled = false; }, 3000);
      } catch (e) {
        btn.textContent = 'Error!';
        setTimeout(() => { btn.textContent = 'Sync Old Complaints'; btn.disabled = false; }, 2000);
      }
    }

    // Load on page ready
    loadComplaints();
  </script>
